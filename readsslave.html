    <script>
        let currentChapter = 1;
        const totalChapters = 2334; // Update this with actual total chapters

         async function loadChapter(chapterNumber) {
            try {
                const response = await fetch('sschapters.json');
                const data = await response.json();
                
                const chapter = data[chapterNumber - 1];
                if (!chapter) throw new Error('Chapter not found');

                document.title = `Chapter ${chapterNumber} - Novel Cult`;
                document.getElementById('chapter-title').textContent = 
                    `Chapter ${chapterNumber}: ${chapter.title}`;
                document.getElementById('chapter-content').innerHTML = chapter.content;

                // Update navigation buttons
                document.getElementById('prevBtn').disabled = chapterNumber === 1;
                document.getElementById('nextBtn').disabled = chapterNumber === totalChapters;
                
                currentChapter = chapterNumber;
                history.replaceState(null, '', `?chapter=${chapterNumber}`);
                
            } catch (error) {
                document.getElementById('chapter-content').innerHTML = 
                    `<p style="color: #ff4444">Error loading chapter: ${error.message}</p>`;
            }
        }

        function previousChapter() {
            if (currentChapter > 1) loadChapter(currentChapter - 1);
        }

        function nextChapter() {
            if (currentChapter < totalChapters) loadChapter(currentChapter + 1);
        }
        // Previous JavaScript code remains the same
        
        async function initializeChapterList() {
            try {
                const response = await fetch('sschapters.json');
                const chapters = await response.json();
                const chapterList = document.getElementById('chapterList');
                
                chapters.forEach((chapter, index) => {
                    const li = document.createElement('li');
                    li.className = 'chapter-item';
                    li.textContent = `Chapter ${index + 1}`;
                    li.addEventListener('click', () => {
                        loadChapter(index + 1);
                        document.getElementById('chapterDropdown').style.display = 'none';
                    });
                    chapterList.appendChild(li);
                });
            } catch (error) {
                console.error('Error loading chapter list:', error);
            }
        }

        // Toggle dropdown visibility
        document.getElementById('menuButton').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('chapterDropdown').style.display = 
                document.getElementById('chapterDropdown').style.display === 'block' ? 'none' : 'block';
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown-container')) {
                document.getElementById('chapterDropdown').style.display = 'none';
            }
        });

        // Update current chapter highlight
        function updateCurrentChapterHighlight(chapterNumber) {
            document.querySelectorAll('.chapter-item').forEach((item, index) => {
                item.classList.toggle('current-chapter', index + 1 === chapterNumber);
            });
            
            // Scroll to current chapter
            const currentItem = document.querySelector('.current-chapter');
            if (currentItem) {
                currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Modified loadChapter function
        async function loadChapter(chapterNumber) {
            try {
                const response = await fetch('sschapters.json');
                const data = await response.json();
                
                const chapter = data[chapterNumber - 1];
                if (!chapter) throw new Error('Chapter not found');

                // Update UI
                document.title = `Chapter ${chapterNumber} - Novel Cult`;
                document.getElementById('chapter-title').textContent = 
                    `Chapter ${chapterNumber}: ${chapter.title}`;
                document.getElementById('chapter-content').innerHTML = chapter.content;

                // Update navigation
                document.getElementById('prevBtn').disabled = chapterNumber === 1;
                document.getElementById('nextBtn').disabled = chapterNumber === totalChapters;
                updateCurrentChapterHighlight(chapterNumber);
                
                currentChapter = chapterNumber;
                history.replaceState(null, '', `?chapter=${chapterNumber}`);
                
            } catch (error) {
                document.getElementById('chapter-content').innerHTML = 
                    `<p style="color: #ff4444">Error loading chapter: ${error.message}</p>`;
            }
        }

        // Initialize when page loads
        initializeChapterList();
        const urlParams = new URLSearchParams(window.location.search);
        const initialChapter = parseInt(urlParams.get('chapter')) || 1;
        loadChapter(initialChapter);
    </script>

<script> // Comment System
  async function loadComments() {
      const novelId = new URLSearchParams(window.location.search).get('novel');
      const chapterNumber = new URLSearchParams(window.location.search).get('chapter');
      
      const commentsRef = firebase.firestore()
          .collection(`novels/${novelId}/chapters/${chapterNumber}/comments`)
          .orderBy('timestamp', 'desc');
  
      commentsRef.onSnapshot(snapshot => {
          const container = document.getElementById('comments-container');
          container.innerHTML = '';
          
          snapshot.forEach(doc => {
              const comment = doc.data();
              const commentHTML = `
                  <div class="comment">
                      <strong>${comment.userName}</strong>
                      <span style="color: #888; font-size: 0.9em">
                          ${new Date(comment.timestamp?.toDate()).toLocaleString()}
                      </span>
                      <p>${comment.text}</p>
                  </div>
              `;
              container.innerHTML += commentHTML;
          });
      });
  }
  
  // Comment Submission
  document.getElementById('comment-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const user = firebase.auth().currentUser;
      if (!user) return alert('Please login to comment');
      
      const commentText = document.getElementById('comment-text').value;
      const novelId = new URLSearchParams(window.location.search).get('novel');
      const chapterNumber = new URLSearchParams(window.location.search).get('chapter');
  
      try {
          await firebase.firestore()
              .collection(`novels/${novelId}/chapters/${chapterNumber}/comments`)
              .add({
                  text: commentText,
                  userId: user.uid,
                  userName: user.displayName || 'Anonymous',
                  timestamp: firebase.firestore.FieldValue.serverTimestamp()
              });
              
          document.getElementById('comment-text').value = '';
      } catch (error) {
          console.error('Error posting comment:', error);
          alert('Error posting comment');
      }
  });
  
  // Initialize comments after page load
  document.addEventListener('DOMContentLoaded', () => {
      loadComments();
  });
      </script>
