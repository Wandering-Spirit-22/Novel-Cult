    /* Dropdown (hidden by default) */

}

<button onclick="login()" class="login-btn" id="login-btn" >
  <a href="login.html"  style="text-decoration: none; color: inherit;">Login</a>
</button>
<script>
  // Firebase Configuration (Replace with your values)
  const firebaseConfig = {
    apiKey: "AIzaSyDrMY8IGn5c0UScMyzGmxo_wIb13jrOQUM",
    authDomain: "novel-cult-d989e.firebaseapp.com",
    projectId: "novel-cult-d989e",
    storageBucket: "novel-cult-d989e.firebasestorage.app",
    messagingSenderId: "878327056169",
    appId: "1:878327056169:web:d4f52ff530300d21d79938",
    measurementId: "G-G27QHBM9T8"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Auth State Listener
  auth.onAuthStateChanged(user => {
    const profileSection = document.getElementById('profile-section');
    const loginBtn = document.getElementById('login-btn');
    
    if (user) {
      // User is logged in - Show profile
      loginBtn.style.display = 'none';
      profileSection.innerHTML = `
        <!-- Update the profile-section innerHTML template -->
<div class="profile-content">
  <div class="avatar-section">
    <img src="${user.photoURL || 'https://via.placeholder.com/120'}" 
         class="profile-avatar" 
         alt="Profile">
  </div>
  <div class="profile-info">
    <div class="profile-field">
      <label>Username:</label>
      <input type="text" id="username" value="${user.displayName || 'User'}" />
    </div>
    <div class="profile-field">
      <label>Email:</label>
      <input type="email" id="email" value="${user.email}" disabled />
    </div>
    <div class="profile-field">
      <label>User ID:</label>
      <input type="text" id="uid" value="${user.uid}" disabled />
    </div>
    <button class="save-btn" onclick="saveProfile()">Save Changes</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>
      `;
    } else {
      // User not logged in - Show login button
      loginBtn.style.display = 'flex';
      profileSection.innerHTML = '';
    }
  });

  async function saveProfile() {
    const user = auth.currentUser;
    const newUsername = document.getElementById('username').value;
    
    try {
      await user.updateProfile({
        displayName: newUsername
      });
      alert('Profile updated successfully!');
    } catch (error) {
      alert('Error updating profile: ' + error.message);
    }
  }
  function logout() {
  auth.signOut().then(() => {
    console.log("User signed out");
  }).catch((error) => {
    alert('Error signing out: ' + error.message);
  });
}
</script>

<script>
  const dropdownButton = document.getElementById('dropdown-button');
  const dropdownMenu   = document.getElementById('dropdown-menu');
  dropdownButton.addEventListener('click', e => {

    dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
