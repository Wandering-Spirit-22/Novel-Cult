    .empty-message {
     text-align: center;

      border: none;

      font-weight: bold;
    }
    
    .remove-btn:hover {

    }
    
  /* Mobile layout */
@media (max-width: 768px) {

</head>
<body>
    <!-- NAVBAR -->
  <header class="navbar">
    <!-- PC logo -->
    <a href="index.html" class="navbar-left navbar-left-pc home-tool">Novel Cult
      <div class="tooltip">Home</div>
    </a>

      <img src="https://i.ibb.co/twMCJrMP/Screenshot-2025-04-18-222419.png" alt="Back"/>Details
    </a>
    
        <div class="navbar-center">
          <input type="text" placeholder="Search novels..." />
        </div>
    
       <!-- Right side -->
    <div class="navbar-right">
        <!-- Desktop links -->
        <nav class="navbar-links">

          <a href="ranking.html" class="nav-item">Ranking</a>
          <a href="latest.html" class="nav-item">Latest</a>
          <a href="popular.html" class="nav-item">Popular</a>
        </nav>
        <!-- Desktop icons -->
        <a href="profile.html" class="nav-item">
          <img class="icon-avatar" src="https://i.ibb.co/ZRBCPT9k/Screenshot-2025-04-16-181414.png" alt="Profile"/>
        </a>
        <a href="community.html" class="nav-item">
          <img class="icon-avatar" src="https://i.ibb.co/TqmzgV3Q/Screenshot-2025-04-16-181325.png" alt="Community"/>
        </a>
  
        <!-- Mobile “More ▼” dropdown -->
        <div class="dropdown">
          <button id="dropdown-button" class="more-button">
            <span>More</span>
            <span class="arrow">▼</span>
          </button>
          <div id="dropdown-menu" class="dropdown-content">
            <a href="ranking.html">Ranking</a>

            <a href="popular.html">Popular</a>
          </div>
        </div>
      </div>
    </header>
    <main class="main-scroll-container">
      <div class="container">
    <h1>📚 My List</h1>
    <table>
      <thead>
        <tr>
          <th>Cover</th>
          <th>Title</th>
          <th>Chapters</th>
          <th>Rating</th>
          <th>Yr-Status</th>
          <th>Status</th>
          <th>Last Read</th>
          <th>Updated</th>
          <th>Added</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="myListTableBody"></tbody>
    </table>
  </div>
  </main>

  <script>
    const tableBody = document.getElementById("myListTableBody");
    let novels = JSON.parse(localStorage.getItem("followedNovels") || "[]");
    // Ensure each novel has originalRating set
    novels = novels.map(novel => {
      if (!novel.originalRating) {
       novel.originalRating = novel.rating;
      }
      return novel;
    });

    function getStatusClass(status) {
      switch (status.toLowerCase()) {
        case "completed": return "status-completed";
        case "reading": return "status-reading";
        case "on-hold": return "status-onhold";
        case "dropped": return "status-dropped";
        default: return "";
      }
    }

    function getRelativeTime(timestamp) {
     const now = Date.now();
      const diff = now - timestamp;
  
      const minute = 60 * 1000;
      const hour = 60 * minute;
      const day = 24 * hour;
  
      if (diff < minute) {
        return 'just now';
      } else if (diff < hour) {
      const minutes = Math.floor(diff / minute);
      return `${minutes} min${minutes > 1 ? 's' : ''} ago`;
    } else if (diff < day) {
       const hours = Math.floor(diff / hour);
       return `${hours} hour${hours > 1 ? 's' : ''} ago`;
      }
  
     const days = Math.floor(diff / day);
     return `${days} day${days > 1 ? 's' : ''} ago`;
    }
    function renderTable() {
      // Sort by rating (desc)
      novels.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));

      if (novels.length === 0) {
       const row = document.createElement('tr');
         row.innerHTML = `
           <td colspan="10" class="empty-message">No novels added in the list currently...</td>
         `;
        tableBody.appendChild(row);
         return;
      }

      tableBody.innerHTML = "";
      novels.forEach((novel, index) => {
        const row = document.createElement("tr");
        const statusClass = getStatusClass(novel.status);
        const yourStatus = novel.yourStatus || "Reading";
        const yourStatusClass = getStatusClass(yourStatus);

        row.innerHTML = `
          <td><img src="${novel.image}" class="cover" alt="${novel.title}"></td>
          <td>${novel.title}</td>
          <td>${novel.chapters}</td>
          <td>
           <select class="rating-dropdown" data-index="${index}">
             ${(() => {
               const original = novel.originalRating;
               const current = novel.rating
               const options = [original]; // start with original
               for (let i = 10; i >= 1; i--) {
                 if (i.toFixed(1) !== original) {
                   options.push(i.toFixed(1));
                 }
                }
                return options.map(val =>
                 `<option value="${val}" ${current == val ? "selected" : ""}>${val}</option>`
                ).join('');
              })()}
           </select>
         </td>

          <td>
            <select class="ys-dropdown ${yourStatusClass}" data-index="${index}">
              <option value="Reading" ${yourStatus === "Reading" ? "selected" : ""}>Reading</option>
              <option value="Completed" ${yourStatus === "Completed" ? "selected" : ""}>Completed</option>
              <option value="On-Hold" ${yourStatus === "On-Hold" ? "selected" : ""}>On-Hold</option>
              <option value="Dropped" ${yourStatus === "Dropped" ? "selected" : ""}>Dropped</option>
            </select>
          </td>
          <td class="${statusClass}">${novel.status}</td>
          <td>${novel.lastRead}</td>
          <td>${novel.updated}</td>
          <td>${getRelativeTime(novel.added)}</td>
          <td><button class="remove-btn" data-index="${index}">🗑️</button></td>
        `;
        tableBody.appendChild(row);
      });

      // Handle Yr-Status dropdown
      document.querySelectorAll('.ys-dropdown').forEach(dropdown => {
        dropdown.addEventListener('change', function () {
          const selected = this.value;
          const index = this.getAttribute('data-index');
          this.className = 'ys-dropdown ' + getStatusClass(selected);
          novels[index].yourStatus = selected;
          localStorage.setItem("followedNovels", JSON.stringify(novels));
          renderTable(); // re-render to update status class and sorting
        });
      });

      // Handle Rating dropdown
      document.querySelectorAll('.rating-dropdown').forEach(dropdown => {
        dropdown.addEventListener('change', function () {
          const newRating = this.value;
          const index = this.getAttribute('data-index');
          novels[index].rating = newRating;
          localStorage.setItem("followedNovels", JSON.stringify(novels));
          renderTable(); // re-render to apply new sort order
        });
      });

      // Confirm Before Remove
      document.querySelectorAll('.remove-btn').forEach(button => {
        button.addEventListener('click', function () {
         const index = this.getAttribute('data-index');
         const modal = document.getElementById("confirmModal");
         const confirmYes = document.getElementById("confirmYes");
         const confirmNo = document.getElementById("confirmNo");         

          modal.style.display = "flex";         
          confirmYes.onclick = () => {
            novels.splice(index, 1);
            localStorage.setItem("followedNovels", JSON.stringify(novels));
            modal.style.display = "none";
            renderTable();
          };         

          confirmNo.onclick = () => {
            modal.style.display = "none";
          };
        });
      });         
    }


    // Initial render
    renderTable();
  </script>
  <!-- Confirm Delete Modal -->
<div id="confirmModal" style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 50; justify-content: center; align-items: center;">
  <div style="background-color: #1e293b; padding: 20px 30px; border-radius: 10px; text-align: center; max-width: 400px;">
    <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Are you sure you want to remove this novel from your list?</h2>
    <div style="display: flex; justify-content: center; gap: 1rem;">
      <button id="confirmYes" style="background-color: #ef4444; color: white; padding: 8px 16px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Yes, Remove</button>
      <button id="confirmNo" style="background-color: #334155; color: white; padding: 8px 16px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Cancel</button>
    </div>
  </div>
</div>

<script>
  const dropdownButton = document.getElementById('dropdown-button');
  const dropdownMenu   = document.getElementById('dropdown-menu');
  dropdownButton.addEventListener('click', e => {
    e.stopPropagation();
    dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
  });
  document.addEventListener('click', () => {
    dropdownMenu.style.display = 'none';
  });
</script>
